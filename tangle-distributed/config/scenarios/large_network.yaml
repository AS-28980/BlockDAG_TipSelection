# 8 processes, small-world topology, 45 seconds
simulation:
  duration: 45.0
  seed: 777

nodes:
  count: 8
  tx_rate: 3.0
  m: 2
  base_port: 9300

tip_selection:
  algorithm: hybrid
  alpha_high: 0.5
  alpha_low: 0.001
  use_random_swipe: true

pow:
  h: 0.8
  difficulty: 0

network:
  topology:
    type: small_world
    k: 4
    p_rewire: 0.3
  latency:
    model: lognormal
    base_ms: 150
    jitter_ms: 80
